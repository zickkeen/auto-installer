---
name: Update Contributors

on:
  push:
    branches: [main]
  schedule:
    # Jalankan setiap hari pukul 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update Contributors
        run: |
          # 1. Ambil data kontributor
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          CONTRIBUTORS=$(curl -s -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$REPO/contributors")

          # 2. Format menjadi Markdown & Encode ke Base64 (agar aman dilempar ke Python)
          CONTRIBUTORS_MD=$(echo "$CONTRIBUTORS" | jq -r '.[] | "- [![" + .login + "](" + .avatar_url + "&s=50)](" + .html_url + ") **" + .login + "** - " + (.contributions | tostring) + " contributions"' | base64 -w 0)

          if [ -z "$CONTRIBUTORS_MD" ]; then
            echo "No contributors found."
            exit 0
          fi

          # 3. Jalankan Python untuk update semua file README
          export CONTRIBUTORS_MD
          python3 -c "
import os
import re
import base64

# Ambil data dari environment
md_content = base64.b64decode(os.environ['CONTRIBUTORS_MD']).decode('utf-8')
files = ['README.md', 'Readme.en.md']

start_marker = ''
end_marker = ''
replacement = f'{start_marker}\n{md_content}\n{end_marker}'
pattern = re.compile(rf'{start_marker}.*?{end_marker}', re.DOTALL)

for file_path in files:
    if not os.path.exists(file_path):
        print(f'File {file_path} tidak ditemukan, skip.')
        continue
        
    with open(file_path, 'r', encoding='utf-8') as f:
        content = f.read()
    
    if start_marker in content:
        new_content = re.sub(pattern, replacement, content)
        with open(file_path, 'w', encoding='utf-8') as f:
            f.write(new_content)
        print(f'Berhasil update {file_path}')
    else:
        print(f'Marker tidak ditemukan di {file_path}. Tambahkan marker manual!')
"

          # 4. Git Commit & Push
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add README.md Readme.en.md
          if git commit -m "docs: update contributors list in all READMEs"; then
            git push
          else
            echo "No changes to commit"
          fi
