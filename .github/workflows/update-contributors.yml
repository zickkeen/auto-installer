name: Update Contributors

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan jalankan manual untuk testing

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Update READMEs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Ambil data kontributor via GitHub API
          REPO="${{ github.repository }}"
          CONTRIBUTORS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/contributors")

          # 2. Format menjadi Markdown (Grid format agar rapi)
          # Menghasilkan: [![user](avatar_url&s=50)](html_url)
          CONTRIBUTORS_MD=$(echo "$CONTRIBUTORS" | jq -r '.[] | "[![" + .login + "](" + .avatar_url + "&s=50)](" + .html_url + ")"' | tr '\n' ' ')

          if [ -z "$CONTRIBUTORS_MD" ] || [ "$CONTRIBUTORS_MD" == "null" ]; then
            echo "No contributors found or API error."
            exit 0
          fi

          export CONTRIBUTORS_MD
          
          # 3. Jalankan Python untuk update file
          python3 -c "
          import os, re

          md_content = os.environ['CONTRIBUTORS_MD']
          files = ['README.md', 'Readme.en.md']
          
          # Marker yang HARUS ada di dalam file README Anda
          start_marker = '<!-- START_CONTRIBUTORS -->'
          end_marker = '<!-- END_CONTRIBUTORS -->'
          
          replacement = f'{start_marker}\n{md_content}\n{end_marker}'
          pattern = re.compile(rf'{start_marker}.*?{end_marker}', re.DOTALL)

          for file_path in files:
              if not os.path.exists(file_path):
                  print(f'File {file_path} skip.')
                  continue
              
              with open(file_path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              if start_marker in content:
                  new_content = pattern.sub(replacement, content)
                  with open(file_path, 'w', encoding='utf-8') as f:
                      f.write(new_content)
                  print(f'Updated {file_path}')
              else:
                  print(f'Marker not found in {file_path}')
          "

      - name: Git Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add README.md Readme.en.md
          if git commit -m "docs: update contributors list"; then
            git push
          else
            echo "No changes to commit"
          fi
