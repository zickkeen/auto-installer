---
name: Update Contributors

on:
  push:
    branches: [main]
  schedule:
    # Jalankan setiap hari pukul 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Contributors
        run: |
          # Install jq untuk parsing JSON
          sudo apt-get update && sudo apt-get install -y jq

          # Fetch contributors dari GitHub API
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          REPO="${{ github.repository }}"
          CONTRIBUTORS=$(curl -s -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$REPO/contributors")

          # Generate markdown untuk contributors
          CONTRIBUTORS_MD=""
          for row in $(echo "$CONTRIBUTORS" | jq -r '.[] | @base64'); do
            _jq() {
              echo ${row} | base64 --decode | jq -r ${1}
            }
            LOGIN=$(_jq '.login')
            AVATAR_URL=$(_jq '.avatar_url')
            HTML_URL=$(_jq '.html_url')
            CONTRIBUTIONS=$(_jq '.contributions')

            LINE="- [![${LOGIN}](${AVATAR_URL}&s=50)](${HTML_URL}) **${LOGIN}** - ${CONTRIBUTIONS} contributions"
            CONTRIBUTORS_MD="${CONTRIBUTORS_MD}${LINE}\n"
          done

          # Update README.md jika ada contributors
          if [ -n "$CONTRIBUTORS_MD" ]; then
            # Update README menggunakan sed atau awk
            # Note: Gunakan perl atau sed yang lebih stabil untuk multiline
            sed -i '//,//{//!d}' README.md
            sed -i "//a $(echo $CONTRIBUTORS_MD)" README.md

            # Konfigurasi Git
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            
            git add README.md
            if git commit -m "docs: update contributors list"; then
              # Push menggunakan remote yang sudah terkonfigurasi otomatis oleh checkout@v4
              git push
            else
              echo "No changes to commit"
            fi
          fi
