---
name: Update Contributors

on:
  push:
    branches: [main]
  schedule:
    # Jalankan setiap hari pukul 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update Contributors
        run: |
          # 1. Ambil data kontributor (jq biasanya sudah terinstall di runner ubuntu)
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          CONTRIBUTORS=$(curl -s -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$REPO/contributors")

          # 2. Generate list kontributor dalam format Markdown
          # Menggunakan printf untuk menangani karakter newline dengan benar
          CONTRIBUTORS_MD=$(echo "$CONTRIBUTORS" | jq -r '.[] | "- [![" + .login + "](" + .avatar_url + "&s=50)](" + .html_url + ") **" + .login + "** - " + (.contributions | tostring) + " contributions"')

          # 3. Masukkan ke README.md
          # Kita gunakan perl karena lebih handal menangani penggantian blok teks multiline
          if [ -n "$CONTRIBUTORS_MD" ]; then
            echo "Updating README..."
            
            # Gunakan penanda khusus agar tidak salah hapus
            START_MARKER=""
            END_MARKER=""
            
            # Gabungkan penanda dengan list kontributor
            NEW_CONTENT="$START_MARKER\n$CONTRIBUTORS_MD\n$END_MARKER"
            
            # Update file menggunakan perl (mencari blok dari START sampai END dan menggantinya)
            perl -i -0777 -pe "s/$START_MARKER.*?$END_MARKER/$NEW_CONTENT/s" README.md

            # 4. Setup Git & Push
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            
            git add README.md
            if git commit -m "docs: update contributors list"; then
              git push
            else
              echo "No changes detected in README.md"
            fi
          else
            echo "No contributors found or API error."
            exit 1
          fi
